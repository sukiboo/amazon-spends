name: Sync to Hugging Face Hub

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so the force-push to HF carries the whole repo, not
          # just the latest commit (HF's git remote rejects shallow pushes).
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git push --force \
            "https://sukiboo:${HF_TOKEN}@huggingface.co/spaces/sukiboo/amazon-spends" \
            main
